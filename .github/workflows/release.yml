name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate checksums
        run: |
          sha256sum cpudirect.ps1 cpudirect.sh > checksums.txt
          echo "## SHA256 Checksums" > release_notes.md
          echo '```' >> release_notes.md
          cat checksums.txt >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "## Verify" >> release_notes.md
          echo '**Linux:**' >> release_notes.md
          echo '```bash' >> release_notes.md
          echo 'sha256sum cpudirect.sh' >> release_notes.md
          echo '```' >> release_notes.md
          echo '**Windows:**' >> release_notes.md
          echo '```powershell' >> release_notes.md
          echo '(Get-FileHash cpudirect.ps1 -Algorithm SHA256).Hash' >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            cpudirect.ps1
            cpudirect.sh
            checksums.txt
          body_path: release_notes.md
